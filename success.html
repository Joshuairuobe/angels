<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Successful — Angels Hair Mall</title>
<style>
body{
  font-family: Inter, system-ui, sans-serif;
  background:#fff;
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}
.card{
  max-width:420px;
  width:100%;
  padding:32px;
  border:1px solid #eee;
  border-radius:16px;
  text-align:center;
}
h1{ font-size:28px; margin-bottom:12px; }
p{ color:#555; margin-bottom:22px; }
button{
  width:100%;
  padding:14px;
  border-radius:999px;
  border:1px solid #111;
  background:#111;
  color:#fff;
  cursor:pointer;
  text-transform:uppercase;
  font-size:12px;
  letter-spacing:.14em;
}
button:hover{ filter:brightness(1.05); }
button:disabled{ opacity:.6; cursor:not-allowed; }
.toast{ margin-top:12px; color:#1f7a3f; }
</style>
</head>
<body>

<div class="card">
  <h1>Payment successful 🎉</h1>
  <p>Your £10 deposit has been received.<br>
     Click below to confirm your booking.</p>

  <button id="confirmBtn">Confirm booking</button>
  <div class="toast" id="toast"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZ_6nBhOpzPBtYunilmDhcKd0Woe1PWYs",
  authDomain: "angelshairmall.firebaseapp.com",
  databaseURL: "https://angelshairmall-default-rtdb.firebaseio.com",
  projectId: "angelshairmall",
  messagingSenderId: "374317477500",
  appId: "1:374317477500:web:ba6aad4bfba04a9ae6e3f9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const confirmBtn = document.getElementById("confirmBtn");
const toastEl = document.getElementById("toast");

onAuthStateChanged(auth, (user) => {
  if (!user) window.location.href = "login.html";
});

confirmBtn.addEventListener("click", async () => {
  // extra safety against double-click / double-tap
  if (confirmBtn.dataset.busy === "1") return;
  confirmBtn.dataset.busy = "1";
  confirmBtn.disabled = true;

  try {
    const raw = localStorage.getItem("pendingBookingDetails");
    if (!raw) throw new Error("No booking found. Please start again.");

    const details = JSON.parse(raw);
    const user = auth.currentUser;
    if (!user) throw new Error("You are not logged in.");

    // ✅ Must exist (set this on booking.html BEFORE redirect to Stripe)
    // details.bookingKey = crypto.randomUUID();
    if (!details.bookingKey) throw new Error("Missing bookingKey. Please start again.");

    // ✅ fixed booking id (idempotent) — prevents duplicates
    const bookingId = details.bookingKey;
    const bookingRef = ref(db, `bookings/${bookingId}`);

    // ✅ stop duplicates if this was already confirmed
    const existing = await get(bookingRef);
    if (existing.exists()) {
      localStorage.removeItem("pendingBookingDetails");
      toastEl.textContent = "✅ Booking already confirmed! Redirecting...";
      setTimeout(() => {
        window.location.href = "booking.html";
      }, 800);
      return;
    }

    const booking = {
      bookingId, // ✅ keep id inside record too

      clientId: user.uid,
      clientEmail: user.email || "",

      stylistId: details.stylistId,
      services: details.services || [],
      totalDurationMins: Number(details.totalDurationMins || 0),

      date: details.date,
      time: details.time,
      startTime: details.startTime || details.time,
      endTime: details.endTime || details.time,

      price: Number(details.price || 0),
      deposit: Number(details.deposit || 10),
      remaining: Number(
        details.remaining ||
        (Number(details.price || 0) - Number(details.deposit || 10))
      ),

      depositPaid: true,
      status: "pending",
      createdAt: Date.now(),
      updatedAt: Date.now()
    };

    await set(bookingRef, booking);

    // 🔔 Notify stylist AFTER booking is created (non-blocking)
    try {
      await notifyStylistViaFormspree({
        stylistId: details.stylistId,
        clientName: user.displayName || "",
        clientEmail: user.email || "",
        services: details.services || [],
        date: details.date,
        time: details.time,
        notes: details.notes || ""
      });
    } catch (err) {
      console.warn("Stylist notification failed (non-blocking):", err);
    }

    localStorage.removeItem("pendingBookingDetails");
    toastEl.textContent = "✅ Booking confirmed! Redirecting...";

    setTimeout(() => {
      window.location.href = "booking.html";
    }, 1200);

  } catch (e) {
    console.error(e);
    toastEl.textContent = e.message || "Could not confirm booking.";
    confirmBtn.disabled = false;
    confirmBtn.dataset.busy = "0";
  }
});

async function notifyStylistViaFormspree(details) {
  const payload = {
    stylistId: details.stylistId,
    client: details.clientName || details.clientEmail || "Client",
    clientEmail: details.clientEmail || "",
    services: (details.services || []).map(s => s.name).join(" + "),
    date: details.date,
    time: details.time,
    notes: details.notes || "—"
  };

  const res = await fetch("https://formspree.io/f/mreaadoz", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  if (!res.ok) {
    console.warn("Stylist email failed:", res.status);
    return; // don't throw
  }
}
</script>

</body>
</html>
