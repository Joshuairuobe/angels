<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Successful — Angels Hair Mall</title>
<style>
body{
  font-family: Inter, system-ui, sans-serif;
  background:#fff;
  color:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}
.card{
  max-width:420px;
  width:100%;
  padding:32px;
  border:1px solid #eee;
  border-radius:16px;
  text-align:center;
}
h1{ font-size:28px; margin-bottom:12px; }
p{ color:#555; margin-bottom:22px; }
button{
  width:100%;
  padding:14px;
  border-radius:999px;
  border:1px solid #111;
  background:#111;
  color:#fff;
  cursor:pointer;
  text-transform:uppercase;
  font-size:12px;
  letter-spacing:.14em;
}
button:hover{ filter:brightness(1.05); }
button:disabled{ opacity:.6; cursor:not-allowed; }
.toast{ margin-top:12px; color:#1f7a3f; }
</style>
</head>
<body>

<div class="card">
  <h1>Payment successful 🎉</h1>
  <p>Your £10 deposit has been received.<br>
     Click below to confirm your booking.</p>

  
  <div class="toast" id="toast"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZ_6nBhOpzPBtYunilmDhcKd0Woe1PWYs",
  authDomain: "angelshairmall.firebaseapp.com",
  databaseURL: "https://angelshairmall-default-rtdb.firebaseio.com",
  projectId: "angelshairmall",
  messagingSenderId: "374317477500",
  appId: "1:374317477500:web:ba6aad4bfba04a9ae6e3f9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const toastEl = document.getElementById("toast");
/* Initialize EmailJS */
emailjs.init("zTUEr7ZAMLe7tBsay");

/* ✅ AUTO CONFIRM BOOKING AFTER STRIPE SUCCESS */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  try {

    const raw = localStorage.getItem("pendingBookingDetails");
    if (!raw) throw new Error("No booking found.");

    const details = JSON.parse(raw);

    if (!details.bookingKey)
      throw new Error("Missing bookingKey.");

    const bookingId = details.bookingKey;
    const bookingRef = ref(db, `bookings/${bookingId}`);

    /* ✅ Prevent duplicate bookings */
    const existing = await get(bookingRef);

    if (existing.exists()) {

      localStorage.removeItem("pendingBookingDetails");

      toastEl.textContent = "✅ Booking already confirmed! Redirecting...";

      setTimeout(()=>{
        window.location.href = "booking.html";
      },800);

      return;
    }

    const booking = {
      bookingId,

      clientId: user.uid,

      clientEmail: details.clientEmail || user.email || "",
      clientName: details.clientName || user.displayName || "Client",

      clientPhone: details.clientPhone || "",
      phone: details.clientPhone || "",

      stylistId: details.stylistId,

      service: details.serviceName || "",
      serviceName: details.serviceName || "",

      services: details.services || [],
      totalDurationMins: Number(details.totalDurationMins || 0),

      date: details.date,
      time: details.time,
      startTime: details.startTime || details.time,
      endTime: details.endTime || details.time,

      price: Number(details.price || 0),
      deposit: Number(details.deposit || 10),

      remaining: Number(
        details.remaining ||
        (Number(details.price || 0) - Number(details.deposit || 10))
      ),

      notes: details.notes || "",

      depositPaid: true,

      /* Stripe succeeded so booking is confirmed */
      status: "confirmed",

      notification: {
        clientConfirmationSent: false
      },

      createdAt: Date.now(),
      updatedAt: Date.now()
    };

   await set(bookingRef, booking);

console.log("BOOKING DETAILS:", details);
console.log("CLIENT EMAIL:", details.clientEmail);
console.log("AUTH EMAIL:", auth.currentUser.email);

await sendClientConfirmation(details);

    /* 🔔 Notify stylist */
    try {

      await notifyStylistViaFormspree({
        stylistId: details.stylistId,
        clientName: user.displayName || "",
        clientEmail: user.email || "",
        services: details.services || [],
        date: details.date,
        time: details.time,
        notes: details.notes || ""
      });

    } catch (err) {
      console.warn("Stylist notification failed:", err);
    }


    localStorage.removeItem("pendingBookingDetails");

    toastEl.textContent = "✅ Booking confirmed! Redirecting...";

    setTimeout(()=>{
      window.location.href = "booking.html";
    },1200);


  } catch(e) {

    console.error(e);
    toastEl.textContent = e.message || "Could not confirm booking.";

  }

});

async function sendClientConfirmation(details){

  const emailAddress = details.clientEmail || auth.currentUser.email;

  console.log("Sending email to:", emailAddress);

  const templateParams = {
    client_name: details.clientName || "Client",
    service: details.serviceName,
    date: details.date,
    time: details.time,
    email: emailAddress
  };

  try {

    const response = await emailjs.send(
      "service_sh63mwi",
      "booking_confirmation",
      templateParams,
      "zTUEr7ZAMLe7tBsay"
    );

    console.log("✅ Email sent", response);

  } catch(error) {

    console.error("❌ Email failed:", error);

  }

}
/* 🔔 EMAIL STYLIST */
async function notifyStylistViaFormspree(details) {

  const payload = {
    stylistId: details.stylistId,
    client: details.clientName || details.clientEmail || "Client",
    clientEmail: details.clientEmail || "",
    services: (details.services || []).map(s => s.name).join(" + "),
    date: details.date,
    time: details.time,
    notes: details.notes || "—"
  };

  const res = await fetch("https://formspree.io/f/mreaadoz", {
    method: "POST",
    headers: {
      "Content-Type":"application/json"
    },
    body: JSON.stringify(payload)
  });

  if(!res.ok){
    console.warn("Stylist email failed:",res.status);
  }

}

</script>
