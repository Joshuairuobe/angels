<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Service Requests — Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display&display=swap" rel="stylesheet">

<style>

body{
  font-family:Inter,sans-serif;
  background:#fafafa;
  padding:30px;
}

.btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 14px;
  border-radius:999px;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  cursor:pointer;
  border:1px solid #111;
  background:#111;
  color:#fff;
  text-decoration:none;
}

.btn.ghost{
  background:transparent;
  color:#111;
}

.stylist-card{
  border:1px solid #e5e5e5;
  border-radius:18px;
  padding:20px;
  margin-bottom:18px;
  background:#fff;
}

.stylist-name{
  font-family:"Playfair Display",serif;
  font-size:22px;
  margin-bottom:14px;
}

.service-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 0;
  border-bottom:1px solid #eee;
}

.service-meta{
  color:#666;
  font-size:13px;
}

.pending{
  font-size:10px;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:#b38b2e;
  margin-right:12px;
}

.save-btn{
  margin-top:16px;
}

.empty{
  padding:50px;
  text-align:center;
  border:1px solid #e5e5e5;
  border-radius:18px;
  background:#fff;
  font-size:15px;
}

.toast{
  position:fixed;
  bottom:30px;
  right:30px;
  background:#111;
  color:#fff;
  padding:12px 18px;
  border-radius:12px;
  opacity:0;
  transform:translateY(20px);
  transition:.25s;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<h1>Service Requests</h1>

<a href="admin.html" class="btn ghost" style="margin-bottom:20px; display:inline-block;">
← Back to Admin
</a>

<div id="requestsWrap"></div>

<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZ_6nBhOpzPBtYunilmDhcKd0Woe1PWYs",
  authDomain: "angelshairmall.firebaseapp.com",
  databaseURL: "https://angelshairmall-default-rtdb.firebaseio.com",
  projectId: "angelshairmall",
  appId: "1:374317477500:web:ba6aad4bfba04a9ae6e3f9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const wrap = document.getElementById("requestsWrap");
const toastEl = document.getElementById("toast");

function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(()=> toastEl.classList.remove("show"), 2400);
}

onAuthStateChanged(auth, async (user) => {

  if (!user) return location.href = "login.html";

  const token = await user.getIdTokenResult();
  if (!token.claims.admin) return alert("Admins only");

  try{

    /* ---------------- LOAD SERVICES ---------------- */

   const [bookingSnap, optionsSnap] = await Promise.all([
  get(ref(db, "bookingServices")),
  get(ref(db, "serviceOptions"))
]);

const services = {};

function flattenServices(obj){
  Object.entries(obj || {}).forEach(([key, val]) => {
    if (val && val.name) {
      services[key] = {
        ...services[key],
        ...val
      };
    } else if (val && typeof val === "object") {
      flattenServices(val);
    }
  });
}

flattenServices(bookingSnap.exists() ? bookingSnap.val() : {});
flattenServices(optionsSnap.exists() ? optionsSnap.val() : {});

    function flattenServices(obj){
      Object.entries(obj || {}).forEach(([key,val])=>{
        if(val && val.name){
          services[key] = val;
        } else if(typeof val === "object"){
          flattenServices(val);
        }
      });
    }

    flattenServices(servicesSnap.val());

    /* ---------------- LOAD STYLISTS ---------------- */

    const stylistsSnap = await get(ref(db, "stylists"));

    if (!stylistsSnap.exists()){
      wrap.innerHTML = `<div class="empty">No stylists found.</div>`;
      return;
    }

    wrap.innerHTML = ""; // clear

    Object.entries(stylistsSnap.val()).forEach(([uid, stylist])=>{

      const reqs = stylist.requestedServices || {};
      const approvedServices = stylist.approvedServices || {};

      // ⭐ MASTER LIST (never lose visibility again)
      const allServiceIds = new Set([
        ...Object.keys(reqs),
        ...Object.keys(approvedServices)
      ]);

      if (allServiceIds.size === 0) return;

      const card = document.createElement("div");
      card.className = "stylist-card";

      card.innerHTML = `
        <div class="stylist-name">
          ${stylist.publicProfile?.name || "Unnamed Stylist"}
        </div>
        <div class="services"></div>
        <button class="btn save-btn">Save Changes</button>
      `;

      const list = card.querySelector(".services");

      // track toggle state
      const toggles = {};

      allServiceIds.forEach(serviceId=>{

        const s = services[serviceId];
        if (!s) return;

        const isApproved = !!approvedServices[serviceId];
        const isRequested = !!reqs[serviceId];

        toggles[serviceId] = isApproved;

        const row = document.createElement("div");
        row.className = "service-row";

        row.innerHTML = `
          <div>
            <strong>${s.name}</strong>
            <div class="service-meta">
            £${s.price ?? s.priceFrom ?? 0} • ${s.durationMins ?? s.duration ?? 0} mins
            </div>
          </div>

          <div style="display:flex; align-items:center; gap:12px;">

            ${
              isApproved
              ? `<span style="color:#2e7d32;font-size:11px;letter-spacing:.12em;">APPROVED</span>`
              : isRequested
                ? `<span class="pending">PENDING</span>`
                : `<span style="font-size:11px;color:#999;">NOT REQUESTED</span>`
            }

            <input type="checkbox" ${isApproved ? "checked" : ""}>
          </div>
        `;

        row.querySelector("input").onchange = e=>{
          toggles[serviceId] = e.target.checked;
        };

        list.appendChild(row);
      });

      /* ---------- SAVE BUTTON ---------- */

      card.querySelector(".save-btn").onclick = async ()=>{

        const updates = {};

        Object.entries(toggles).forEach(([sid, checked])=>{

          const path = `stylists/${uid}/approvedServices/${sid}`;

          if (checked){
            updates[path] = true;    // approve
          }else{
            updates[path] = null;    // ⭐ unapprove
          }

        });

        try{
          await update(ref(db), updates);
          toast("Services updated ✔");

        }catch(err){
          console.error(err);
          toast("Update failed — check rules.");
        }
      };

      wrap.appendChild(card);

    });

    if (!wrap.children.length){
      wrap.innerHTML = `
        <div class="empty">
          No service activity yet.
        </div>
      `;
    }

  }catch(err){
    console.error(err);
    wrap.innerHTML = `<div class="empty">Failed to load requests.</div>`;
  }

});

</script>


</body>
</html>
